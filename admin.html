<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notificaciones Pantallas</title>
    <style>
        :root { --primary: #007aff; --bg: #f5f5f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 450px 1fr; width: 100%; }
        
        /* Columna Izquierda */
        .form-section { background: white; padding: 30px; box-shadow: 10px 0 30px rgba(0,0,0,0.05); overflow-y: auto; border-right: 1px solid #d2d2d7; }
        h2 { font-size: 22px; margin-bottom: 25px; font-weight: 700; color: #1d1d1f; }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #86868b; margin: 15px 0 5px 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 5px; }
        
        button { width: 100%; padding: 16px; background: #1d1d1f; color: white; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        button:hover { background: #000; }

        /* Lista de Avisos Activos */
        .item-activo { 
            background: #fff; padding: 15px; border-radius: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 10px; border: 1px solid #eee; border-left: 6px solid #000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .item-info b { display: block; font-size: 14px; color: #1d1d1f; }
        .item-info span { font-size: 12px; color: #86868b; font-weight: 600; }
        
        .btn-borrar { width: auto; padding: 8px 12px; margin: 0; background: #ff3b30; font-size: 11px; }

        /* Columna Derecha: Previsualización */
        .preview-section { display: flex; align-items: center; justify-content: center; background: #e9ecef; }
        .notif-card { 
            width: 500px; background: white; border-radius: 24px; padding: 20px 25px; 
            display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: translateY(20px); opacity: 0; transition: 0.5s;
        }
        .notif-card.show { transform: translateY(0); opacity: 1; }
        .app-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .app-icon svg { width: 30px; height: 30px; fill: white; }
        .badge { font-size: 11px; font-weight: 900; padding: 6px 12px; border-radius: 10px; background: rgba(255,255,255,0.6); }
        .urgente-glow { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); } 70% { box-shadow: 0 0 0 20px rgba(255,59,48,0); } 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="form-section">
        <h2>Gestor de notificaciones</h2>
        <form id="notif-form">
            <label>Título</label><input type="text" id="in-titulo" required>
            <label>Mensaje</label><textarea id="in-mensaje" rows="2"></textarea>
            <label>Categoría</label>
            <select id="in-categoria">
                <option value="Aviso">Aviso</option>
                <option value="Urgente">Urgente</option>
                <option value="Mantenimiento">Mantenimiento</option>
                <option value="Seguridad">Seguridad</option>
                <option value="Visitas">Visitas</option>
                <option value="Pentano">Pentano</option>
            </select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1"><label>Fecha</label><input type="date" id="in-fecha"></div>
                <div style="flex:1"><label>Hora</label><input type="time" id="in-hora"></div>
            </div>
            <button type="submit" id="btn-enviar">PUBLICAR AHORA</button>
        </form>

        <div style="margin-top:40px;">
            <label>Avisos Activos en Pantalla</label>
            <div id="lista-activos"></div>
        </div>
    </div>

    <div class="preview-section">
        <div id="pv-card" class="notif-card">
            <div id="pv-icon" class="app-icon"></div>
            <div style="flex:1"><div id="pv-titulo" style="font-weight:800; font-size:18px;"></div><div id="pv-mensaje" style="font-size:15px; color:#444"></div></div>
            <div id="pv-badge" class="badge"></div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxZ8WhMYqVFJVbCu0fAEHwsWFVKN0WY7LITAAsNoo7QVnTKdndM3-6Nffj6GPFpMaaP/exec';

    const assets = {
        'Urgente': { color: '#FF3B30', bg: '#ffe6e6', svg: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'},
        'Aviso': { color: '#007AFF', bg: '#e1f0ff', svg: '<svg viewBox="0 0 24 24"><path d="M12 22a2.98 2.98 0 0 1-2.9-2h5.8a2.98 2.98 0 0 1-2.9 2zm9-3V9c0-4.97-4.03-9-9-9S3 4.03 3 9v7l-2 2v1h22v-1l-2-2z"/></svg>'},
        'Mantenimiento': { color: '#FF9500', bg: '#fff5d2', svg: '<svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>'},
        'Seguridad': { color: '#FF3B30', bg: '#ffe6e6', svg: '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12h-7V6.3l7-3.11v8.8z"/></svg>'},
        'Visitas': { color: '#34C759', bg: '#e6fae6', svg: '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'},
        'Pentano': { color: '#AF52DE', bg: '#faebff', svg: '<svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>'}
    };

    function updatePreview() {
        const tit = document.getElementById('in-titulo').value;
        const cat = document.getElementById('in-categoria').value;
        const card = document.getElementById('pv-card');
        if(tit) card.classList.add('show'); else card.classList.remove('show');
        const tema = assets[cat];
        card.style.backgroundColor = tema.bg;
        document.getElementById('pv-icon').style.backgroundColor = tema.color;
        document.getElementById('pv-icon').innerHTML = tema.svg;
        document.getElementById('pv-titulo').innerText = tit;
        document.getElementById('pv-mensaje').innerText = document.getElementById('in-mensaje').value;
        if(cat === 'Urgente') card.classList.add('urgente-glow'); else card.classList.remove('urgente-glow');
        let f = document.getElementById('in-fecha').value;
        let h = document.getElementById('in-hora').value;
        let bTxt = f ? f.split('-').reverse().join('/') : "";
        document.getElementById('pv-badge').innerText = (bTxt && h) ? bTxt + " | " + h : bTxt + h;
    }

    async function cargar() {
        const lista = document.getElementById('lista-activos');
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            if (!data || data.length === 0) {
                lista.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No hay avisos</div>';
                return;
            }
            lista.innerHTML = '';
            data.forEach(item => {
                const tema = assets[item.categoria] || {color: '#ddd'};
                
                // --- LÓGICA DE LIMPIEZA DE FECHA Y HORA ---
                let fClean = item.fecha ? item.fecha.toString() : "";
                // Si la fecha es el churro largo "Wed Apr 15...", intentamos formatearla
                if (fClean.length > 15) {
                    const d = new Date(fClean);
                    if (!isNaN(d)) fClean = ("0" + d.getDate()).slice(-2) + "/" + ("0" + (d.getMonth() + 1)).slice(-2) + "/" + d.getFullYear();
                }
                if (fClean.includes("1899")) fClean = "";

                let hClean = item.hora ? item.hora.toString().substring(0, 5) : "";
                // -----------------------------------------

                const div = document.createElement('div');
                div.className = 'item-activo';
                div.style.borderLeftColor = tema.color;
                div.innerHTML = `
                    <div class="item-info">
                        <b>${item.titulo}</b>
                        <span>${item.categoria} ${fClean ? '• ' + fClean : ''} ${hClean ? '• ' + hClean : ''}</span>
                    </div>
                    <button class="btn-borrar" onclick="eliminar(${item.fila})">BORRAR</button>`;
                lista.appendChild(div);
            });
        } catch (e) { console.error(e); }
    }

    async function eliminar(f) {
        if(!confirm('¿Eliminar aviso?')) return;
        await fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'delete', fila:f})});
        setTimeout(cargar, 1000);
    }

    document.getElementById('notif-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar'); btn.innerText = "ENVIANDO..."; btn.disabled = true;
        const payload = { titulo: document.getElementById('in-titulo').value, mensaje: document.getElementById('in-mensaje').value, categoria: document.getElementById('in-categoria').value, fecha: document.getElementById('in-fecha').value, hora: document.getElementById('in-hora').value };
        await fetch(WEB_APP_URL, {method:'POST', mode:'no-cors', body:JSON.stringify(payload)});
        document.getElementById('notif-form').reset(); updatePreview(); setTimeout(cargar, 1000); btn.innerText = "PUBLICAR AHORA"; btn.disabled = false;
    };

    ['in-titulo', 'in-mensaje', 'in-categoria', 'in-fecha', 'in-hora'].forEach(id => document.getElementById(id).addEventListener('input', updatePreview));
    cargar();
</script>
</body>
</html>
