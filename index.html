<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenedor Principal */
        #main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            gap: 15px;
            position: relative;
        }

        /* Contador Superior discreto */
        #header-info {
            display: flex;
            justify-content: flex-end;
            min-height: 20px;
            padding-right: 10px;
        }
        .count-badge {
            font-size: 12px; font-weight: 800; color: rgba(0,0,0,0.3);
            text-transform: uppercase; letter-spacing: 1px;
            background: rgba(255,255,255,0.4); padding: 4px 12px; border-radius: 20px;
        }

        /* --- SECCIÓN FIJA: URGENCIAS --- */
        #urgentes-fixed {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0; /* No permite que se encoja */
            z-index: 10; /* Por encima del scroll */
            position: relative;
            padding-bottom: 5px; /* Pequeño colchón antes del degradado */
        }

        /* --- SECCIÓN SCROLL: RESTO DE AVISOS --- */
        #scroll-viewport {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            z-index: 1;
            
            /* --- MEJORA: DOBLE DEGRADADO (Arriba y Abajo) --- */
            /* Desvanece el contenido al entrar (top) y al salir (bottom) */
            -webkit-mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 8%,    /* Degradado de entrada suave */
                black 92%,   /* Zona visible total */
                transparent 100% /* Degradado de salida suave */
            );
            mask-image: linear-gradient(
                to bottom,
                transparent 0%,
                black 8%,
                black 92%,
                transparent 100%
            );
        }

        #normales-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            position: absolute;
            top: 0;
            transition: top 1.5s ease-in-out; /* Velocidad del auto-scroll */
            padding-top: 10px; /* Evita que la primera tarjeta normal toque el degradado inmediatamente */
        }

        /* --- ESTILOS DE TARJETA (Limpios) --- */
        .notif-card {
            position: relative;
            width: 100%; border-radius: 22px;
            display: flex; align-items: center; gap: 18px;
            padding: 18px 24px; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transform: translateX(100%); opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.6s ease;
        }
        .notif-card.show { transform: translateX(0); opacity: 1; }

        .notif-card::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 22px; z-index: -1; pointer-events: none;
        }

        /* Glows (Pulso y Entrada) */
        .urgente-glow::after { animation: pulseUrgente 2s infinite ease-in-out; opacity: 1; }
        .active-glow::after { box-shadow: 0 0 15px 2px var(--glow-color); animation: glowFade 8s forwards; }

        @keyframes pulseUrgente {
            0%, 100% { box-shadow: 0 0 15px 4px rgba(255, 59, 48, 0.5); }
            50% { box-shadow: 0 0 25px 10px rgba(255, 59, 48, 0.8); }
        }
        @keyframes glowFade { 0%, 100% { opacity: 0; } 10%, 90% { opacity: 1; } }

        /* Punto Azul de Nuevo */
        .new-indicator-dot {
            position: absolute; top: 15px; right: 20px;
            width: 10px; height: 10px; background-color: #007aff; border-radius: 50%;
        }
        .new-indicator-dot::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #007aff; border-radius: 50%; animation: sonar 2.5s infinite;
        }
        @keyframes sonar { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(3); opacity: 0; } }

        /* Iconografía Estática */
        .app-icon {
            width: 58px; height: 58px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .app-icon svg { width: 34px; height: 34px; fill: white; }

        .content { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
        .title { font-weight: 800; font-size: 20px; color: #1a1a1a; letter-spacing: -0.5px; }
        .message { font-size: 17px; line-height: 1.3; font-weight: 600; color: #444; }
        
        .date-badge {
            font-size: 11px; font-weight: 900; padding: 6px 12px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.06);
            text-transform: uppercase; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="header-info"></div>
        
        <div id="urgentes-fixed"></div>
        
        <div id="scroll-viewport">
            <div id="normales-stack"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '168DpGwqRcSsXtJoGPNqzJtHhtjjfFtrpcqLnnKq8CIY';
        let scrollDir = 1;

        const assets = {
            'Urgente': { bg: 'rgba(255, 235, 235, 0.98)', icon: '#FF3B30', text: '#600', svg: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'},
            'Aviso': { bg: 'rgba(230, 242, 255, 0.98)', icon: '#007AFF', text: '#003', svg: '<svg viewBox="0 0 24 24"><path d="M12 22a2.98 2.98 0 0 1-2.9-2h5.8a2.98 2.98 0 0 1-2.9 2zm9-3V9c0-4.97-4.03-9-9-9S3 4.03 3 9v7l-2 2v1h22v-1l-2-2z"/></svg>'},
            'Mantenimiento': { bg: 'rgba(255, 248, 225, 0.98)', icon: '#FF9500', text: '#540', svg: '<svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>'},
            'Seguridad': { bg: 'rgba(255, 235, 235, 0.98)', icon: '#FF3B30', text: '#600', svg: '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12h-7V6.3l7-3.11v8.8z"/></svg>'},
            'Visitas': { bg: 'rgba(235, 255, 235, 0.98)', icon: '#34C759', text: '#030', svg: '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'},
            'Pentano': { bg: 'rgba(245, 235, 255, 0.98)', icon: '#AF52DE', text: '#303', svg: '<svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-2 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>'},
            'Empty': { bg: 'rgba(245, 245, 247, 0.95)', icon: '#8E8E93', text: '#333', svg: '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>'}
        };

        async function checkSheet() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&refresh=${Date.now()}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let urgentes = [], normales = [];
                const hoy = new Date(); hoy.setHours(0,0,0,0);

                rows.forEach((row, index) => {
                    const c = row.c;
                    if (!c || (c[5]?.v || "").toString().toUpperCase() !== "SI") return;

                    let fechaAviso = null;
                    if (c[3]?.v) {
                        const d = eval("new " + c[3].v);
                        fechaAviso = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                    }
                    if (fechaAviso && fechaAviso < hoy) return;

                    let etiquetaFecha = c[3]?.f || "", esHoy = (fechaAviso && fechaAviso.getTime() === hoy.getTime());
                    if (esHoy) etiquetaFecha = "HOY";

                    let catTexto = (c[2]?.v || "").toString();
                    let categoria = catTexto.includes("Urgen") ? "Urgente" : (catTexto.includes("Mante") ? "Mantenimiento" : (catTexto.includes("Visita") ? "Visitas" : (catTexto.includes("Seguri") ? "Seguridad" : (catTexto.includes("Penta") ? "Pentano" : "Aviso"))));

                    const data = { id: `notif-${index}`, titulo: c[0]?.v || "Aviso", msg: c[1]?.v || "", cat: categoria, fecha: etiquetaFecha, hora: c[4]?.f || "", esNuevo: esHoy };

                    if (data.cat === 'Urgente') urgentes.push(data);
                    else normales.push(data);
                });

                // Contador
                const total = urgentes.length + normales.length;
                document.getElementById('header-info').innerHTML = total > 0 ? `<div class="count-badge">${total} avisos activos</div>` : '';

                // Renderizar Urgentes (Fijos)
                const fixedCont = document.getElementById('urgentes-fixed');
                urgentes.forEach((d, i) => updateOrCreate(fixedCont, d.id, d, false, i));

                // Renderizar Normales (Scroll)
                const scrollCont = document.getElementById('normales-stack');
                if (total === 0) {
                    updateOrCreate(scrollCont, 'empty', { titulo: "Sin avisos", msg: "Todo en orden por ahora.", cat: 'Empty', esNuevo: false }, true, 0);
                } else {
                    normales.forEach((d, i) => updateOrCreate(scrollCont, d.id, d, false, i));
                }

                // Limpieza de antiguos
                const activeIds = [...urgentes, ...normales].map(d => d.id);
                if(total === 0) activeIds.push('empty');
                document.querySelectorAll('.notif-card').forEach(n => {
                    if(!activeIds.includes(n.id)) { n.classList.remove('show'); setTimeout(() => n.remove(), 600); }
                });

            } catch (e) { console.error(e); }
        }

        function updateOrCreate(container, id, data, isEmpty, index) {
            let el = document.getElementById(id);
            const tema = assets[data.cat];

            if (!el) {
                el = document.createElement('div'); el.id = id; el.className = 'notif-card';
                el.innerHTML = `<div class="new-indicator-dot"></div><div class="app-icon"></div><div class="content"><div class="title"></div><div class="message"></div></div><div class="date-badge"></div>`;
                container.appendChild(el);
                setTimeout(() => el.classList.add('show'), 100 * index);
            }

            if (el.parentElement !== container) container.appendChild(el); // Mover si cambió de categoría
            
            el.style.backgroundColor = tema.bg;
            el.classList.remove('urgente-glow', 'active-glow');
            if (data.cat === 'Urgente') el.classList.add('urgente-glow');
            else if (!isEmpty) { el.classList.add('active-glow'); el.style.setProperty('--glow-color', tema.icon + '30'); }

            const icon = el.querySelector('.app-icon');
            icon.style.backgroundColor = tema.icon; icon.innerHTML = tema.svg;
            
            el.querySelector('.title').innerText = data.titulo; el.querySelector('.title').style.color = tema.text;
            el.querySelector('.message').innerText = data.msg;
            
            const dot = el.querySelector('.new-indicator-dot');
            dot.style.display = (data.esNuevo && data.cat !== 'Urgente') ? 'block' : 'none';

            const badge = el.querySelector('.date-badge');
            if (data.fecha) { badge.style.display = 'block'; badge.innerText = `${data.fecha} ${data.hora || ''}`; badge.style.color = tema.text; }
            else badge.style.display = 'none';
        }

        // --- LÓGICA DE AUTO-SCROLL (Ajustada para mayor suavidad) ---
        function handleAutoScroll() {
            const viewport = document.getElementById('scroll-viewport');
            const stack = document.getElementById('normales-stack');
            
            // Altura real del contenido vs altura disponible
            const scrollMax = stack.offsetHeight - viewport.offsetHeight;

            if (scrollMax > 0) {
                // Hay exceso de contenido -> scroll activado
                let currentTop = parseInt(stack.style.top) || 0;
                
                if (currentTop <= -(scrollMax + 20)) scrollDir = -1; // Llegó al final (añadimos margen)
                if (currentTop >= 0) scrollDir = 1; // Volvió al inicio

                // Incremento de scroll (30px cada 3s)
                stack.style.top = (currentTop - (30 * scrollDir)) + "px";
            } else {
                // El contenido cabe perfectamente -> resetear scroll
                stack.style.top = "0px";
            }
        }

        setInterval(checkSheet, 5000); // Sincronización con Google
        setInterval(handleAutoScroll, 3000); // Movimiento de scroll cada 3s
        checkSheet(); // Carga inicial
    </script>
</body>
</html>
