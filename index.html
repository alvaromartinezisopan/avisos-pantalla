<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px 35px 20px 35px; 
            box-sizing: border-box;
            transform: translateZ(0);
        }

        #notification-stack {
            display: flex;
            flex-direction: column;
            gap: 14px; 
            width: 100%;
        }

        .notif-card {
            position: relative;
            width: 100%; 
            border-radius: 25px;
            display: flex; align-items: center; gap: 22px;
            padding: 22px 30px; 
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            transform: translateX(110%); 
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.6s ease;
            background-color: white;
            will-change: transform;
            overflow: hidden;
        }
        .notif-card.show { transform: translateX(0); opacity: 1; }

        /* ESTILOS POR CATEGORÍA */
        .celeb-special { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 40%, #a1c4fd 80%, #c2e9fb 100%) !important; 
            min-height: 140px;
            border: 2px solid #fff !important;
        }

        .urgente-special { 
            background: #ff4b42 !important; 
            min-height: 140px;
            border: 2px solid #fff !important;
        }

        /* Color Azul Isopan para reposo y avisos normales */
        .reposo-style { background-color: #d4eaff !important; } 
        .aviso-style { background-color: #d4eaff !important; }

        .title { color: #1a1a1a; font-weight: 800; font-size: 22px; letter-spacing: -0.6px; }
        .message { color: #333; font-size: 18px; line-height: 1.3; font-weight: 600; }
        
        .celeb-special .title, .urgente-special .title { font-size: 26px; font-weight: 900; }
        .urgente-special .title, .urgente-special .message { color: white !important; }

        .app-icon {
            position: relative;
            width: 55px; height: 55px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .celeb-special .app-icon, .urgente-special .app-icon { 
            width: 75px; height: 75px; background: white !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .app-icon svg { width: 34px; height: 34px; fill: white; }
        .celeb-special .app-icon svg { fill: #ff2d55 !important; width: 42px; height: 42px; }
        .urgente-special .app-icon svg { fill: #ff4b42 !important; width: 42px; height: 42px; }
        
        .content { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; z-index: 2; }
        
        .date-badge {
            display: none;
            font-size: 16px; font-weight: 900; padding: 10px 20px; border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a1a;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .date-badge:not(:empty) { display: block; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="notification-stack"></div>
    </div>

    <script>
        const SHEET_ID = '168DpGwqRcSsXtJoGPNqzJtHhtjjfFtrpcqLnnKq8CIY';
        const CELEB_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSadkiXq6jUCVSyiHwtutKKXkP3gxIFJmmHRJfnaLqYFxMJOYcNOU6SLURm2g090_DAK18G1Gtb7Ux/pub?output=csv';

        const SVGS = {
            'Aviso': '<svg viewBox="0 0 24 24"><path d="M12 22a2.98 2.98 0 0 1-2.9-2h5.8a2.98 2.98 0 0 1-2.9 2zm9-3V9c0-4.97-4.03-9-9-9S3 4.03 3 9v7l-2 2v1h22v-1l-2-2z"/></svg>',
            'Check': '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
            'Star': '<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>',
            'Heart': '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
            'Bolt': '<svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>'
        };

        const colors = {
            'Isopan': '#007aff', // Azul estándar Isopan
            'Urgente': '#ff3b30',
            'Ceb': '#ff2d55'
        };

        async function updateDashboard() {
            let items = [];
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const mañana = new Date(hoy); mañana.setDate(mañana.getDate() + 1);

            try {
                // 1. Notificaciones desde Google Sheets
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&refresh=${Date.now()}`;
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                json.table.rows.forEach((row, idx) => {
                    const c = row.c;
                    if (c && (c[5]?.v || "").toString().toUpperCase() === "SI") {
                        let f = c[3]?.v ? new Date(eval("new " + c[3].v)) : null;
                        if (f) f.setHours(0,0,0,0);
                        
                        if (!f || f >= hoy) {
                            let label = "";
                            if (f) {
                                if (f.getTime() === hoy.getTime()) label = "HOY";
                                else if (f.getTime() === mañana.getTime()) label = "MAÑANA";
                                else label = c[3]?.f || "";
                            }
                            items.push({
                                id: `n-${idx}`,
                                title: c[0]?.v || "Aviso",
                                msg: c[1]?.v || "",
                                cat: (c[2]?.v || "").includes("Urgen") ? "Urgente" : "Aviso",
                                badge: label
                            });
                        }
                    }
                });

                // 2. Celebraciones
                const cRes = await fetch(`${CELEB_SHEET_URL}&t=${Date.now()}`);
                const cText = await cRes.text();
                const cRows = cText.split('\n').map(r => r.split(','));
                
                for (let i = 1; i < cRows.length; i++) {
                    const [nom, ape, nac, inc] = cRows[i];
                    if (!nom) continue;
                    const full = `${nom.trim()} ${ape ? ape.trim() : ''}`.toUpperCase();
                    const dNac = nac?.split('/');
                    const dInc = inc?.split('/');

                    if (dNac && parseInt(dNac[0]) === hoy.getDate() && parseInt(dNac[1]) === (hoy.getMonth()+1)) {
                        items.push({ id: `c-n-${i}`, title: `MUCHAS FELICIDADES, ${full}`, msg: "Hoy es tu gran día. Todo el equipo te desea un año lleno de alegrías. Disfrútalo.", cat: "Celebracion", sub: "Star", badge: "HOY" });
                    }
                    if (dInc && parseInt(dInc[0]) === hoy.getDate() && parseInt(dInc[1]) === (hoy.getMonth()+1)) {
                        const años = hoy.getFullYear() - parseInt(dInc[2]);
                        if (años > 0) items.push({ id: `c-a-${i}`, title: `FELIZ ANIVERSARIO, ${full}`, msg: `Increíble. Ya sumas ${años} años con nosotros. Gracias por tu entrega diaria.`, cat: "Celebracion", sub: "Heart", badge: "HOY" });
                        else items.push({ id: `c-b-${i}`, title: `BIENVENIDO/A AL EQUIPO, ${full}`, msg: "Hoy comienzas tu camino con nosotros. Estamos encantados de que formes parte de esta familia.", cat: "Celebracion", sub: "Bolt", badge: "HOY" });
                    }
                }

                // 3. Tarjeta de Reposo (Azul Isopan con Tick)
                if (items.length === 0) {
                    items.push({ id: 'reposo', title: 'TODO EN ORDEN', msg: 'No hay avisos ni eventos para el día de hoy.', cat: 'Reposo', badge: '' });
                }

                renderItems(items);
            } catch (e) { console.error(e); }
        }

        function renderItems(data) {
            const stack = document.getElementById('notification-stack');
            const ids = data.map(d => d.id);

            document.querySelectorAll('.notif-card').forEach(el => {
                if (!ids.includes(el.id)) {
                    el.classList.remove('show');
                    setTimeout(() => el.remove(), 600);
                }
            });

            data.forEach((d, i) => {
                let el = document.getElementById(d.id);
                if (!el) {
                    el = document.createElement('div');
                    el.id = d.id;
                    el.className = 'notif-card';
                    el.innerHTML = `<div class="app-icon"></div><div class="content"><div class="title"></div><div class="message"></div></div><div class="date-badge"></div>`;
                    stack.appendChild(el);
                    setTimeout(() => el.classList.add('show'), 100);
                }
                
                el.style.order = i;
                el.className = `notif-card show ${d.cat === 'Celebracion' ? 'celeb-special' : d.cat === 'Urgente' ? 'urgente-special' : d.cat === 'Reposo' ? 'reposo-style' : 'aviso-style'}`;
                
                el.querySelector('.title').innerText = d.title;
                el.querySelector('.message').innerText = d.msg;
                const badge = el.querySelector('.date-badge');
                badge.innerText = d.badge;
                badge.style.display = d.badge ? 'block' : 'none';
                
                const iconBox = el.querySelector('.app-icon');
                if (d.cat === 'Celebracion') {
                    iconBox.innerHTML = SVGS[d.sub] || SVGS['Star'];
                    iconBox.style.backgroundColor = 'white';
                } else if (d.cat === 'Urgente') {
                    iconBox.innerHTML = SVGS['Aviso'];
                    iconBox.style.backgroundColor = 'white';
                } else if (d.cat === 'Reposo') {
                    iconBox.innerHTML = SVGS['Check'];
                    iconBox.style.backgroundColor = colors.Isopan;
                } else {
                    iconBox.innerHTML = SVGS['Aviso'];
                    iconBox.style.backgroundColor = colors.Isopan;
                }
            });
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
