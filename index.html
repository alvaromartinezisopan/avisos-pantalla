<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden;
            background-color: transparent !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px 35px 20px 35px; 
            box-sizing: border-box;
            transform: translateZ(0);
        }

        #notification-stack {
            display: flex;
            flex-direction: column;
            gap: 14px; 
            width: 100%;
        }

        .notif-card {
            position: relative;
            width: 100%; 
            border-radius: 25px;
            display: flex; align-items: center; gap: 18px;
            padding: 18px 26px; 
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transform: translateX(110%); 
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.6s ease;
            background-color: white;
            will-change: transform;
            overflow: hidden; /* Crucial para recortar el confetti */
        }
        .notif-card.show { transform: translateX(0); opacity: 1; }

        /* CELEBRACIONES CON GRAN ACUMULACIÓN DE CONFETTI FIJO */
        .celeb-special {
            min-height: 130px !important;
            border: 2px solid #fff !important;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 40%, #a1c4fd 80%, #c2e9fb 100%) !important;
        }

        /* Capa de Confetti Denso y Grande */
        .celeb-special::before {
            content: "";
            position: absolute;
            /* Ocupa toda la tarjeta */
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            /* Puntos mucho más grandes y variados */
            background-image: 
                radial-gradient(circle, #ff2d55 5px, transparent 6px), 
                radial-gradient(circle, #ffcc00 6px, transparent 7px), 
                radial-gradient(circle, #ffffff 5px, transparent 6px),
                radial-gradient(circle, #4facfe 5px, transparent 6px),
                radial-gradient(circle, #ff5e62 4px, transparent 5px),
                radial-gradient(circle, #34C759 4px, transparent 5px);
            /* Tamaños de repetición grandes para evitar patrones obvios */
            background-size: 130px 170px, 190px 230px, 250px 210px, 160px 290px, 110px 140px, 210px 180px;
            /* Posiciones iniciales variadas */
            background-position: 10% 10%, 30% 50%, 70% 20%, 90% 80%, 50% 90%, 80% 60%;
            opacity: 0.7; /* Más visible */
            /* Máscara para que se acumule a la derecha pero no tape el texto de la izquierda */
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 10%, rgba(0,0,0,0.8) 40%, rgba(0,0,0,0) 80%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 10%, rgba(0,0,0,0.8) 40%, rgba(0,0,0,0) 80%);
        }

        .celeb-special .app-icon { 
            width: 68px; height: 68px; 
            background: white !important; 
            z-index: 2; /* Por encima del confetti */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .celeb-special .title { font-weight: 900 !important; font-size: 24px !important; color: #1a1a1a; z-index: 2; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .celeb-special .message { font-weight: 700 !important; font-size: 19px !important; color: #333; z-index: 2; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }

        .app-icon {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .app-icon svg { width: 30px; height: 30px; fill: white; }
        .celeb-special .app-icon svg { width: 38px; height: 38px; fill: #ff2d55; }
        
        .content { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; z-index: 2; }
        .title { font-weight: 800; font-size: 19px; color: #1a1a1a; letter-spacing: -0.5px; }
        .message { font-size: 16px; line-height: 1.3; font-weight: 600; color: #444; }
        
        .date-badge {
            display: none;
            font-size: 12px; font-weight: 900; padding: 7px 14px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.1);
            text-transform: uppercase;
            z-index: 3; /* Por encima de todo */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .date-badge:not(:empty) { display: block; }

        .urgente-glow { border: 2px solid #FF3B30 !important; background: #ffebeb !important; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="notification-stack"></div>
    </div>

    <script>
        const SHEET_ID = '168DpGwqRcSsXtJoGPNqzJtHhtjjfFtrpcqLnnKq8CIY';
        const CELEB_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSSadkiXq6jUCVSyiHwtutKKXkP3gxIFJmmHRJfnaLqYFxMJOYcNOU6SLURm2g090_DAK18G1Gtb7Ux/pub?output=csv';

        const SVGS = {
            'Urgente': '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>',
            'Aviso': '<svg viewBox="0 0 24 24"><path d="M12 22a2.98 2.98 0 0 1-2.9-2h5.8a2.98 2.98 0 0 1-2.9 2zm9-3V9c0-4.97-4.03-9-9-9S3 4.03 3 9v7l-2 2v1h22v-1l-2-2z"/></svg>',
            'Mantenimiento': '<svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>',
            'Seguridad': '<svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12h-7V6.3l7-3.11v8.8z"/></svg>',
            'Visitas': '<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>',
            'Pentano': '<svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-2 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>',
            'Estrella': '<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>',
            'Corazon': '<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
            'Rayo': '<svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>'
        };

        const assets = {
            'Urgente': { bg: '#ffebeb', icon: '#FF3B30' },
            'Celebracion': { bg: 'transparent', icon: '#FF2D55' },
            'Aviso': { bg: '#eef6ff', icon: '#007AFF' },
            'Mantenimiento': { bg: '#fff9e6', icon: '#FF9500' },
            'Seguridad': { bg: '#ffebeb', icon: '#FF3B30' },
            'Visitas': { bg: '#f2fff5', icon: '#34C759' },
            'Pentano': { bg: '#f9f2ff', icon: '#AF52DE' }
        };

        async function fetchCelebrations() {
            try {
                const response = await fetch(`${CELEB_SHEET_URL}&t=${Date.now()}`);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));
                const today = new Date();
                const day = today.getDate();
                const month = today.getMonth() + 1;
                const year = today.getFullYear();
                let celebrations = [];

                for (let i = 1; i < rows.length; i++) {
                    const [nombre, apellido, nacimiento, incorporacion, msgCumple, msgAniv, msgBienvenida] = rows[i];
                    if (!nombre) continue;
                    const fullName = `${nombre.trim()} ${apellido ? apellido.trim() : ''}`.toUpperCase();
                    const parseDate = (str) => {
                        if (!str) return null;
                        const parts = str.split('/');
                        return { d: parseInt(parts[0]), m: parseInt(parts[1]), y: parseInt(parts[2]) };
                    };
                    const dateNac = parseDate(nacimiento);
                    const dateInc = parseDate(incorporacion);

                    if (dateNac && dateNac.d === day && dateNac.m === month) {
                        celebrations.push({ titulo: `FELIZ CUMPLEANOS, ${fullName}`, msg: msgCumple || `Hoy celebramos tu dia. Que pases una jornada excelente.`, cat: 'Celebracion', subCat: 'Cumple' });
                    }
                    if (dateInc && dateInc.d === day && dateInc.m === month) {
                        if (msgBienvenida && msgBienvenida.trim() !== "") {
                            celebrations.push({ titulo: `BIENVENIDO/A, ${fullName}`, msg: msgBienvenida, cat: 'Celebracion', subCat: 'Bienvenida' });
                        } else if (dateInc.y === year) {
                            celebrations.push({ titulo: `BIENVENIDO/A, ${fullName}`, msg: `Te damos la bienvenida a nuestro equipo.`, cat: 'Celebracion', subCat: 'Bienvenida' });
                        } else {
                            const años = year - dateInc.y;
                            const textoAños = años === 1 ? "1 ano" : `${años} anos`;
                            celebrations.push({ titulo: `ANIVERSARIO DE ${fullName}`, msg: msgAniv || `Hoy cumple ${textoAños} con nosotros. Gracias por estar aqui.`, cat: 'Celebracion', subCat: 'Aniversario' });
                        }
                    }
                }
                return celebrations;
            } catch (e) { return []; }
        }

        async function checkSheet() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&refresh=${Date.now()}`;
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let allNotifs = [];
                const hoy = new Date(); hoy.setHours(0,0,0,0);

                rows.forEach((row, index) => {
                    const c = row.c;
                    if (!c || (c[5]?.v || "").toString().toUpperCase() !== "SI") return;
                    let fechaAviso = null;
                    if (c[3]?.v) {
                        const d = eval("new " + c[3].v);
                        fechaAviso = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                    }
                    if (fechaAviso && fechaAviso < hoy) return;
                    
                    let etiquetaFecha = (fechaAviso && fechaAviso.getTime() === hoy.getTime()) ? "HOY" : (c[3]?.f || "");
                    let etiquetaHora = c[4]?.f || "";
                    let finalBadge = "";
                    if (etiquetaFecha && etiquetaHora) finalBadge = `${etiquetaFecha} | ${etiquetaHora}`;
                    else if (etiquetaFecha) finalBadge = etiquetaFecha;
                    else if (etiquetaHora) finalBadge = etiquetaHora;

                    let catTexto = (c[2]?.v || "").toString();
                    let categoria = catTexto.includes("Urgen") ? "Urgente" : (catTexto.includes("Mante") ? "Mantenimiento" : (catTexto.includes("Visita") ? "Visitas" : (catTexto.includes("Seguri") ? "Seguridad" : (catTexto.includes("Penta") ? "Pentano" : "Aviso"))));
                    allNotifs.push({ id: `notif-${index}`, titulo: c[0]?.v || "Aviso", msg: c[1]?.v || "", cat: categoria, badgeText: finalBadge });
                });

                const celebEvents = await fetchCelebrations();
                celebEvents.forEach((celeb, idx) => {
                    allNotifs.push({ id: `celeb-${idx}`, ...celeb, badgeText: "HOY" });
                });

                allNotifs.sort((a, b) => (a.cat === 'Urgente' ? -1 : (b.cat === 'Urgente' ? 1 : (a.cat === 'Celebracion' ? -1 : 1))));

                const stack = document.getElementById('notification-stack');
                allNotifs.forEach((d, i) => updateOrCreate(stack, d.id, d, i));

                const activeIds = allNotifs.map(d => d.id);
                document.querySelectorAll('.notif-card').forEach(n => {
                    if(!activeIds.includes(n.id)) { n.classList.remove('show'); setTimeout(() => n.remove(), 700); }
                });
            } catch (e) { console.error(e); }
        }

        function updateOrCreate(container, id, data, index) {
            let el = document.getElementById(id);
            const tema = assets[data.cat];
            if (!el) {
                el = document.createElement('div'); el.id = id; el.className = 'notif-card';
                el.innerHTML = `<div class="app-icon"></div><div class="content"><div class="title"></div><div class="message"></div></div><div class="date-badge"></div>`;
                container.appendChild(el);
                setTimeout(() => el.classList.add('show'), 100);
            }
            el.style.order = index;
            el.style.backgroundColor = tema.bg;
            el.classList.toggle('celeb-special', data.cat === 'Celebracion');
            el.classList.toggle('urgente-glow', data.cat === 'Urgente');
            
            const iconContainer = el.querySelector('.app-icon');
            iconContainer.style.backgroundColor = (data.cat === 'Celebracion') ? 'transparent' : tema.icon;
            
            if (data.cat === 'Celebracion') {
                if (data.subCat === 'Cumple') iconContainer.innerHTML = SVGS['Estrella'];
                else if (data.subCat === 'Bienvenida') iconContainer.innerHTML = SVGS['Rayo'];
                else iconContainer.innerHTML = SVGS['Corazon'];
            } else {
                iconContainer.innerHTML = SVGS[data.cat] || SVGS['Aviso'];
            }

            el.querySelector('.title').innerText = data.titulo;
            el.querySelector('.message').innerText = data.msg;
            el.querySelector('.date-badge').innerText = data.badgeText || "";
        }

        setInterval(checkSheet, 20000);
        checkSheet();
    </script>
</body>
</html>
